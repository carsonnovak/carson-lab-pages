<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carson's Lab Pages</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --accent-dim: #1f3a5f;
    --green: #3fb950;
    --green-dim: #1a3828;
    --amber: #d29922;
    --amber-dim: #3d2f00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
    max-width: 900px;
    margin: 0 auto;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    flex-shrink: 0;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    padding-left: 52px;
  }
  .repo-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    margin-top: 14px;
    padding-left: 52px;
  }
  .repo-link:hover { text-decoration: underline; }

  /* Main */
  main { max-width: 900px; margin: 0 auto; padding: 32px 40px 0; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .file-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* Project grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    display: block;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover::before { opacity: 1; }

  .card-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-size {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 8px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.2);
  }
  .card-arrow {
    position: absolute;
    right: 18px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--border);
    transition: color 0.15s, transform 0.15s;
  }
  .card:hover .card-arrow {
    color: var(--accent);
    transform: translateY(-50%) translateX(2px);
  }

  /* States */
  .state {
    padding: 48px 0;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .state-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
    opacity: 0.4;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Last updated */
  .footer {
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-note {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .refresh-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--muted); }

  @media (max-width: 560px) {
    header, main, .footer { padding-left: 20px; padding-right: 20px; }
    .subtitle, .repo-link { padding-left: 0; margin-top: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="avatar">CN</div>
    <div>
      <h1>Carson's Lab Pages</h1>
    </div>
  </div>
  <p class="subtitle">HTML projects pushed by Claude — live on GitHub Pages</p>
  <a class="repo-link" href="https://github.com/carsonnovak/carson-lab-pages" target="_blank">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    carsonnovak/carson-lab-pages
  </a>
</header>

<main>
  <div class="section-header">
    <span class="section-title">Deployed pages</span>
    <span class="file-count" id="file-count">—</span>
  </div>
  <div class="grid" id="grid">
    <div class="state"><div class="spinner"></div>Fetching from GitHub…</div>
  </div>
</main>

<div class="footer">
  <span class="footer-note" id="last-updated">—</span>
  <button class="refresh-btn" onclick="loadFiles()">↻ Refresh</button>
</div>

<script>
const OWNER = 'carsonnovak';
const REPO = 'carson-lab-pages';
const BASE_URL = `https://${OWNER}.github.io/${REPO}`;

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  return (bytes / 1024).toFixed(1) + ' KB';
}

function formatName(filename) {
  return filename.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

async function loadFiles() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="state"><div class="spinner"></div>Fetching from GitHub…</div>';

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const files = await res.json();

    const htmlFiles = files.filter(f =>
      f.type === 'file' &&
      f.name.endsWith('.html') &&
      f.name !== 'index.html'
    );

    document.getElementById('file-count').textContent = htmlFiles.length + ' file' + (htmlFiles.length !== 1 ? 's' : '');
    document.getElementById('last-updated').textContent = 'fetched ' + new Date().toLocaleTimeString();

    if (htmlFiles.length === 0) {
      grid.innerHTML = `<div class="state"><span class="state-icon">📂</span>No pages deployed yet — push something!</div>`;
      return;
    }

    grid.innerHTML = htmlFiles.map(f => `
      <a class="card" href="${BASE_URL}/${f.path}" target="_blank">
        <div class="card-name">${f.name}</div>
        <div class="card-meta">
          <span class="card-size">${formatSize(f.size)}</span>
          <span class="badge">live</span>
        </div>
        <span class="card-arrow">→</span>
      </a>
    `).join('');

  } catch (err) {
    grid.innerHTML = `<div class="state"><span class="state-icon">⚠</span>Could not reach GitHub API.<br><small style="margin-top:6px;display:block;">${err.message}</small></div>`;
  }
}

loadFiles();
</script>
</body>
</html>
